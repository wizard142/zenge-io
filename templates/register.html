<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zenge — Forge Your Soul</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--ink:#080d14;--pane:rgba(8,14,22,0.82);--teal:#4ecdc4;--teal-dim:rgba(78,205,196,0.14);--teal-glow:rgba(78,205,196,0.4);--gold:#c8a84b;--text:#d8efe0;--muted:#4a6660;--border:rgba(78,205,196,0.18)}
    body{font-family:'Crimson Pro',serif;background:var(--ink);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
    #scene{position:fixed;inset:0;z-index:0}
    .vignette{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse 80% 80% at 50% 50%,transparent 25%,rgba(4,8,14,0.88) 100%)}
    .logo-wrap{position:fixed;top:32px;left:50%;transform:translateX(-50%);z-index:10;text-align:center}
    .logo-title{font-family:'Cinzel Decorative',serif;font-size:34px;font-weight:700;letter-spacing:0.25em;color:var(--teal);text-shadow:0 0 36px var(--teal-glow),0 0 70px rgba(78,205,196,0.15);line-height:1}
    .logo-sub{font-style:italic;font-size:12px;color:var(--muted);letter-spacing:0.35em;text-transform:uppercase;margin-top:6px}
    .card{position:relative;z-index:10;width:440px;background:var(--pane);border:1px solid var(--border);backdrop-filter:blur(22px);padding:44px 44px 40px;animation:emerge 0.9s cubic-bezier(0.16,1,0.3,1) 0.2s both}
    @keyframes emerge{from{opacity:0;transform:translateY(28px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
    .card::before,.card::after{content:'⬡';position:absolute;font-size:13px;color:var(--teal);opacity:0.45}
    .card::before{top:-8px;left:-6px}.card::after{bottom:-8px;right:-6px}
    .deco{display:flex;align-items:center;gap:12px;margin-bottom:26px}
    .deco::before,.deco::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,var(--teal),transparent);opacity:0.35}
    .deco-sym{font-size:18px;color:var(--teal);text-shadow:0 0 14px var(--teal-glow)}
    h1{font-family:'Cinzel',serif;font-size:21px;font-weight:600;letter-spacing:0.08em;margin-bottom:5px;text-align:center}
    .sub{text-align:center;font-style:italic;font-size:14px;color:var(--muted);margin-bottom:24px}
    .error{background:rgba(220,80,80,0.1);border:1px solid rgba(220,80,80,0.35);color:#e09090;font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.07em;padding:10px 14px;margin-bottom:18px;text-align:center}
    .success{background:rgba(78,205,196,0.1);border:1px solid rgba(78,205,196,0.3);color:var(--teal);font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.07em;padding:10px 14px;margin-bottom:18px;text-align:center}
    .field{margin-bottom:17px}
    label{display:block;font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--teal);opacity:0.65;margin-bottom:8px}
    input{width:100%;background:rgba(78,205,196,0.04);border:1px solid rgba(78,205,196,0.18);color:var(--text);font-family:'Crimson Pro',serif;font-size:16px;padding:13px 18px;outline:none;transition:border-color .3s,background .3s,box-shadow .3s}
    input::placeholder{color:var(--muted);font-style:italic}
    input:focus{border-color:var(--teal);background:var(--teal-dim);box-shadow:0 0 0 3px rgba(78,205,196,0.1)}
    .hint{font-size:11px;color:var(--muted);font-style:italic;margin-top:5px;padding-left:2px}
    .btn{width:100%;margin-top:8px;padding:15px;background:linear-gradient(135deg,rgba(78,205,196,0.88),rgba(50,170,162,0.9));color:#080d14;font-family:'Cinzel',serif;font-size:12px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;border:none;cursor:pointer;transition:box-shadow .3s,transform .2s}
    .btn:hover{box-shadow:0 0 28px var(--teal-glow),0 4px 16px rgba(0,0,0,0.5);transform:translateY(-1px)}
    .divider{display:flex;align-items:center;gap:14px;margin:22px 0 16px}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .divider span{font-size:11px;color:var(--muted)}
    .back-link{display:block;text-align:center;font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);text-decoration:none;padding:9px;border:1px solid rgba(78,205,196,0.15);transition:color .3s,border-color .3s}
    .back-link:hover{color:var(--teal);border-color:rgba(78,205,196,0.35)}
    .strength-bar{height:3px;background:rgba(78,205,196,0.1);margin-top:8px;border-radius:2px;overflow:hidden}
    .strength-fill{height:100%;width:0%;transition:width .3s,background .3s}
    .runes{display:flex;justify-content:center;gap:18px;margin-top:22px;opacity:0.15}
    .runes span{font-size:15px;color:var(--teal)}
  </style>
</head>
<body>
<canvas id="scene"></canvas>
<div class="vignette"></div>
<div class="logo-wrap">
  <div class="logo-title">ZENGE</div>
  <div class="logo-sub">Forge your identity</div>
</div>
<div class="card">
  <div class="deco"><div class="deco-sym">⬡</div></div>
  <h1>Create Your Soul</h1>
  <p class="sub">A new traveler steps into the realm</p>
  {% if error %}<div class="error">⚠ {{ error }}</div>{% endif %}
  <form action="/register" method="post">
    <div class="field">
      <label>Email Address</label>
      <input type="email" name="email" placeholder="traveler@realm.io" required autocomplete="email"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" id="pw" placeholder="· · · · · · · ·" required autocomplete="new-password" oninput="updateStrength(this.value)"/>
      <div class="hint">Minimum 6 characters</div>
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" name="confirm" placeholder="· · · · · · · ·" required autocomplete="new-password"/>
    </div>
    <button class="btn" type="submit">⬡ Forge My Soul</button>
  </form>
  <div class="divider"><span>already have an account?</span></div>
  <a href="/" class="back-link">← Return to Sign In</a>
  <div class="runes"><span>⬡</span><span>◈</span><span>✦</span><span>◈</span><span>⬡</span></div>
</div>
<script>
function updateStrength(v){
  const f=document.getElementById('strength-fill');
  let s=0;
  if(v.length>=6)s+=25;if(v.length>=10)s+=25;
  if(/[A-Z]/.test(v)&&/[a-z]/.test(v))s+=25;
  if(/[^a-zA-Z0-9]/.test(v)||/[0-9]/.test(v))s+=25;
  f.style.width=s+'%';
  f.style.background=s<=25?'#e05555':s<=50?'#f59e0b':s<=75?'#4ecdc4':'#34d399';
}
// background
const canvas=document.getElementById('scene'),ctx=canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight}resize();addEventListener('resize',resize);
const stars=Array.from({length:180},()=>({x:Math.random(),y:Math.random()*0.8,r:Math.random()*1.2+0.2,o:Math.random()*0.5+0.15,t:Math.random()*Math.PI*2,s:Math.random()*0.015+0.003}));
// Teal aurora layers instead of mountains
const aurora=[
  {color:'rgba(78,205,196,0.04)',y:0.3,w:0.8,phase:0,speed:0.004},
  {color:'rgba(78,205,196,0.025)',y:0.45,w:1.1,phase:1,speed:0.003},
  {color:'rgba(50,170,180,0.03)',y:0.25,w:0.6,phase:2,speed:0.005},
];
const mts=[{c:'#080e18',p:[0,1,0.15,0.6,0.3,0.72,0.5,0.58,0.7,0.7,0.88,0.62,1,1],sp:0},{c:'#0c1422',p:[0,1,0.12,0.72,0.3,0.8,0.5,0.7,0.7,0.78,0.9,0.72,1,1],sp:0.00006}];
let t=0;
function draw(){
  const W=canvas.width,H=canvas.height;ctx.clearRect(0,0,W,H);
  const sk=ctx.createLinearGradient(0,0,0,H);sk.addColorStop(0,'#030810');sk.addColorStop(1,'#080d14');ctx.fillStyle=sk;ctx.fillRect(0,0,W,H);
  // aurora glow
  aurora.forEach(a=>{a.phase+=a.speed;const cx2=W/2+Math.sin(a.phase)*W*0.15;const g=ctx.createRadialGradient(cx2,a.y*H,0,cx2,a.y*H,W*a.w*0.5);g.addColorStop(0,a.color);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(0,0,W,H)});
  stars.forEach(s=>{s.t+=s.s;ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(200,240,235,${s.o*(0.6+0.4*Math.sin(s.t))})`;ctx.fill()});
  // teal moon
  const mx=0.2*W,my=0.18*H,mr=44;
  const mg=ctx.createRadialGradient(mx-mr*.3,my-mr*.2,0,mx,my,mr);mg.addColorStop(0,'#a0ece8');mg.addColorStop(1,'#2a8a86');
  ctx.beginPath();ctx.arc(mx,my,mr,0,Math.PI*2);ctx.fillStyle=mg;ctx.fill();
  ctx.beginPath();ctx.arc(mx+mr*.22,my-mr*.1,mr*.84,0,Math.PI*2);ctx.fillStyle='rgba(4,8,18,0.55)';ctx.fill();
  mts.forEach(m=>{const off=(t*m.sp*W)%W;ctx.beginPath();ctx.moveTo(-off,H);for(let i=0;i<m.p.length;i+=2)ctx.lineTo(m.p[i]*W-off,m.p[i+1]*H);ctx.lineTo(W*2-off,H);ctx.closePath();ctx.fillStyle=m.c;ctx.fill();
    if(m.sp>0){ctx.beginPath();ctx.moveTo(W-off,H);for(let i=0;i<m.p.length;i+=2)ctx.lineTo(m.p[i]*W+W-off,m.p[i+1]*H);ctx.lineTo(W*3-off,H);ctx.closePath();ctx.fillStyle=m.c;ctx.fill()}});
  t++;requestAnimationFrame(draw)}
draw();
</script>
</body>
</html>
