<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zenge — Enter the Realm</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--ink:#0a0c14;--pane:rgba(10,12,22,0.78);--gold:#c8a84b;--gold-dim:rgba(200,168,75,0.15);--gold-glow:rgba(200,168,75,0.4);--teal:#4ecdc4;--text:#e8dfc8;--muted:#6b6550;--border:rgba(200,168,75,0.18)}
    body{font-family:'Crimson Pro',serif;background:var(--ink);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
    #scene{position:fixed;inset:0;z-index:0}
    .particles{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
    .particle{position:absolute;background:var(--gold);border-radius:50%;opacity:0;animation:floatUp linear infinite}
    @keyframes floatUp{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:0.6}90%{opacity:0.3}100%{transform:translateY(-10vh) scale(1);opacity:0}}
    .vignette{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse 80% 80% at 50% 50%,transparent 30%,rgba(5,7,15,0.85) 100%)}
    .logo-wrap{position:fixed;top:36px;left:50%;transform:translateX(-50%);z-index:10;text-align:center}
    .logo-title{font-family:'Cinzel Decorative',serif;font-size:38px;font-weight:700;letter-spacing:0.25em;color:var(--gold);text-shadow:0 0 40px var(--gold-glow),0 0 80px rgba(200,168,75,0.2);line-height:1}
    .logo-sub{font-family:'Crimson Pro',serif;font-style:italic;font-size:13px;color:var(--muted);letter-spacing:0.35em;text-transform:uppercase;margin-top:6px}
    .card{position:relative;z-index:10;width:430px;background:var(--pane);border:1px solid var(--border);backdrop-filter:blur(20px);padding:44px 44px 40px;animation:emerge 1s cubic-bezier(0.16,1,0.3,1) 0.3s both}
    @keyframes emerge{from{opacity:0;transform:translateY(30px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
    .card::before,.card::after{content:'◈';position:absolute;font-size:14px;color:var(--gold);opacity:0.5}
    .card::before{top:-8px;left:-8px}.card::after{bottom:-8px;right:-8px}
    .deco{display:flex;align-items:center;gap:12px;margin-bottom:28px}
    .deco::before,.deco::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);opacity:0.4}
    .deco-sym{font-size:18px;color:var(--gold);text-shadow:0 0 12px var(--gold-glow)}
    h1{font-family:'Cinzel',serif;font-size:22px;font-weight:600;letter-spacing:0.08em;margin-bottom:5px;text-align:center}
    .sub{text-align:center;font-style:italic;font-size:14px;color:var(--muted);margin-bottom:24px}
    .error{background:rgba(220,80,80,0.12);border:1px solid rgba(220,80,80,0.35);color:#e09090;font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.07em;padding:10px 14px;margin-bottom:18px;text-align:center}
    .field{margin-bottom:18px}
    label{display:block;font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);opacity:0.7;margin-bottom:8px}
    input{width:100%;background:rgba(200,168,75,0.04);border:1px solid rgba(200,168,75,0.2);color:var(--text);font-family:'Crimson Pro',serif;font-size:16px;padding:13px 18px;outline:none;transition:border-color .3s,background .3s,box-shadow .3s}
    input::placeholder{color:var(--muted);font-style:italic}
    input:focus{border-color:var(--gold);background:var(--gold-dim);box-shadow:0 0 0 3px rgba(200,168,75,0.1)}
    .btn{width:100%;margin-top:6px;padding:15px;background:linear-gradient(135deg,rgba(200,168,75,0.92),rgba(178,138,38,0.92));color:#0a0c14;font-family:'Cinzel',serif;font-size:12px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;border:none;cursor:pointer;transition:box-shadow .3s,transform .2s}
    .btn:hover{box-shadow:0 0 28px var(--gold-glow),0 4px 16px rgba(0,0,0,0.5);transform:translateY(-1px)}
    .divider{display:flex;align-items:center;gap:14px;margin:22px 0 18px}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .divider span{font-size:11px;color:var(--muted)}
    .links{display:flex;flex-direction:column;gap:10px}
    .reg-btn{display:block;text-align:center;font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--teal);border:1px solid rgba(78,205,196,0.3);padding:11px;text-decoration:none;transition:background .3s,border-color .3s}
    .reg-btn:hover{background:rgba(78,205,196,0.08);border-color:rgba(78,205,196,0.55)}
    .admin-link{display:block;text-align:center;font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);text-decoration:none;padding:7px;transition:color .3s}
    .admin-link:hover{color:var(--gold)}
    .runes{display:flex;justify-content:center;gap:20px;margin-top:22px;opacity:0.18}
    .runes span{font-size:16px;color:var(--gold)}
  </style>
</head>
<body>
<canvas id="scene"></canvas>
<div class="particles" id="particles"></div>
<div class="vignette"></div>
<div class="logo-wrap">
  <div class="logo-title">ZENGE</div>
  <div class="logo-sub">A Journey of Silence &amp; Light</div>
</div>
<div class="card">
  <div class="deco"><div class="deco-sym">✦</div></div>
  <h1>Enter the Realm</h1>
  <p class="sub">Sign in to continue your journey</p>
  {% if error %}<div class="error">⚠ {{ error }}</div>{% endif %}
  <form action="/login" method="post">
    <div class="field">
      <label>Email Address</label>
      <input type="email" name="email" placeholder="traveler@realm.io" required/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="· · · · · · · ·" required/>
    </div>
    <button class="btn" type="submit">Begin the Journey</button>
  </form>
  <div class="divider"><span>or</span></div>
  <div class="links">
    <a href="/register" class="reg-btn">✦ Create New Account</a>
    <a href="/admin-login" class="admin-link">⚜ Keeper's Sanctum</a>
  </div>
  <div class="runes"><span>◈</span><span>✦</span><span>⬡</span><span>✦</span><span>◈</span></div>
</div>
<script>
const canvas=document.getElementById('scene'),ctx=canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight}resize();addEventListener('resize',resize);
const stars=Array.from({length:200},()=>({x:Math.random(),y:Math.random()*0.75,r:Math.random()*1.4+0.3,o:Math.random()*0.7+0.2,t:Math.random()*Math.PI*2,s:Math.random()*0.02+0.005}));
const mts=[{c:'#0d1526',p:[0,1,0.15,0.55,0.3,0.7,0.45,0.5,0.6,0.65,0.75,0.45,0.9,0.6,1,1],sp:0},{c:'#101a2e',p:[0,1,0.1,0.68,0.25,0.55,0.4,0.72,0.55,0.58,0.7,0.68,0.85,0.55,1,1],sp:0.00005},{c:'#142035',p:[0,1,0.12,0.75,0.28,0.65,0.42,0.78,0.58,0.7,0.72,0.75,0.88,0.65,1,1],sp:0.0001},{c:'#172840',p:[0,1,0.08,0.82,0.22,0.72,0.38,0.85,0.54,0.75,0.68,0.82,0.84,0.73,1,1],sp:0.00018}];
let t=0;
function draw(){
  const W=canvas.width,H=canvas.height;ctx.clearRect(0,0,W,H);
  const sk=ctx.createLinearGradient(0,0,0,H);sk.addColorStop(0,'#020510');sk.addColorStop(1,'#0a0c14');ctx.fillStyle=sk;ctx.fillRect(0,0,W,H);
  stars.forEach(s=>{s.t+=s.s;ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,245,220,${s.o*(0.7+0.3*Math.sin(s.t))})`;ctx.fill()});
  const mx=0.78*W,my=0.18*H,mr=55;
  const mg=ctx.createRadialGradient(mx-mr*.3,my-mr*.2,0,mx,my,mr);mg.addColorStop(0,'#f0e8c0');mg.addColorStop(1,'#a0883a');
  ctx.beginPath();ctx.arc(mx,my,mr,0,Math.PI*2);ctx.fillStyle=mg;ctx.fill();
  ctx.beginPath();ctx.arc(mx+mr*.25,my-mr*.1,mr*.85,0,Math.PI*2);ctx.fillStyle='rgba(5,8,18,0.5)';ctx.fill();
  mts.forEach(m=>{const off=(t*m.sp*W)%W;ctx.beginPath();ctx.moveTo(-off,H);for(let i=0;i<m.p.length;i+=2)ctx.lineTo(m.p[i]*W-off,m.p[i+1]*H);ctx.lineTo(W*2-off,H);ctx.closePath();ctx.fillStyle=m.c;ctx.fill();
    if(m.sp>0){ctx.beginPath();ctx.moveTo(W-off,H);for(let i=0;i<m.p.length;i+=2)ctx.lineTo(m.p[i]*W+W-off,m.p[i+1]*H);ctx.lineTo(W*3-off,H);ctx.closePath();ctx.fillStyle=m.c;ctx.fill()}});
  t++;requestAnimationFrame(draw)}
draw();
function sp(){const p=document.createElement('div');p.className='particle';const s=Math.random()*3+1;p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}vw;animation-duration:${8+Math.random()*12}s;animation-delay:${Math.random()*3}s;`;document.getElementById('particles').appendChild(p);setTimeout(()=>p.remove(),22000)}
setInterval(sp,700);
</script>
</body>
</html>
