<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zenge — Enter the Realm</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0a0c14;
      --deep: #0f1320;
      --pane: rgba(10,12,22,0.75);
      --gold: #c8a84b;
      --gold-dim: rgba(200,168,75,0.15);
      --gold-glow: rgba(200,168,75,0.4);
      --teal: #4ecdc4;
      --teal-dim: rgba(78,205,196,0.12);
      --text: #e8dfc8;
      --muted: #6b6550;
      --border: rgba(200,168,75,0.18);
    }

    body {
      font-family: 'Crimson Pro', serif;
      background: var(--ink);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── CANVAS BACKGROUND ── */
    #scene { position: fixed; inset: 0; z-index: 0; }

    /* ── FLOATING PARTICLES ── */
    .particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
    .particle {
      position: absolute;
      background: var(--gold);
      border-radius: 50%;
      opacity: 0;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* ── VIGNETTE ── */
    .vignette {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 30%, rgba(5,7,15,0.85) 100%);
    }

    /* ── LOGO ── */
    .logo-wrap {
      position: fixed; top: 36px; left: 50%; transform: translateX(-50%);
      z-index: 10; text-align: center;
    }
    .logo-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 38px;
      font-weight: 700;
      letter-spacing: 0.25em;
      color: var(--gold);
      text-shadow: 0 0 40px var(--gold-glow), 0 0 80px rgba(200,168,75,0.2);
      line-height: 1;
    }
    .logo-sub {
      font-family: 'Crimson Pro', serif;
      font-style: italic;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-top: 6px;
    }

    /* ── CARD ── */
    .card {
      position: relative; z-index: 10;
      width: 420px;
      background: var(--pane);
      border: 1px solid var(--border);
      backdrop-filter: blur(20px);
      padding: 48px 44px 44px;
      animation: emergeCard 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
    }

    @keyframes emergeCard {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Ornamental corners */
    .card::before, .card::after {
      content: '◈';
      position: absolute;
      font-size: 14px;
      color: var(--gold);
      opacity: 0.5;
    }
    .card::before { top: -8px; left: -8px; }
    .card::after  { bottom: -8px; right: -8px; }

    /* Top decorative line */
    .card-deco {
      display: flex; align-items: center; gap: 12px; margin-bottom: 32px;
    }
    .card-deco::before, .card-deco::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      opacity: 0.4;
    }
    .card-deco-symbol {
      font-size: 18px; color: var(--gold); line-height: 1;
      text-shadow: 0 0 12px var(--gold-glow);
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      color: var(--text);
      text-align: center;
    }
    .subtitle {
      text-align: center;
      font-style: italic;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 36px;
      letter-spacing: 0.03em;
    }

    .field { margin-bottom: 20px; }

    label {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.7;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: rgba(200,168,75,0.04);
      border: 1px solid rgba(200,168,75,0.2);
      color: var(--text);
      font-family: 'Crimson Pro', serif;
      font-size: 16px;
      padding: 13px 18px;
      outline: none;
      transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
    }
    input::placeholder { color: var(--muted); font-style: italic; }
    input:focus {
      border-color: var(--gold);
      background: var(--gold-dim);
      box-shadow: 0 0 0 3px rgba(200,168,75,0.1), inset 0 1px 0 rgba(200,168,75,0.05);
    }

    .btn {
      width: 100%;
      margin-top: 8px;
      padding: 15px 20px;
      background: linear-gradient(135deg, rgba(200,168,75,0.9), rgba(180,140,40,0.9));
      color: #0a0c14;
      font-family: 'Cinzel', serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: box-shadow 0.3s, transform 0.2s;
    }
    .btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .btn:hover {
      box-shadow: 0 0 30px var(--gold-glow), 0 4px 16px rgba(0,0,0,0.5);
      transform: translateY(-1px);
    }
    .btn:hover::before { opacity: 1; }
    .btn:active { transform: translateY(0); }

    .divider {
      display: flex; align-items: center; gap: 14px; margin: 28px 0 20px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: var(--border);
    }
    .divider span { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }

    .admin-link {
      display: block; text-align: center;
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.3s;
      padding: 8px;
    }
    .admin-link:hover { color: var(--gold); }
    .admin-link::before { content: '⚜ '; opacity: 0.6; }
    .admin-link::after  { content: ' ⚜'; opacity: 0.6; }

    /* Bottom rune row */
    .runes {
      display: flex; justify-content: center; gap: 20px;
      margin-top: 28px; opacity: 0.2;
    }
    .runes span { font-size: 16px; color: var(--gold); }
  </style>
</head>
<body>

<canvas id="scene"></canvas>
<div class="particles" id="particles"></div>
<div class="vignette"></div>

<div class="logo-wrap">
  <div class="logo-title">ZENGE</div>
  <div class="logo-sub">A Journey of Silence & Light</div>
</div>

<div class="card">
  <div class="card-deco"><div class="card-deco-symbol">✦</div></div>
  <h1>Enter the Realm</h1>
  <p class="subtitle">Submit your passage to the world beyond</p>

  <form action="/submit" method="post">
    <div class="field">
      <label>Your Address</label>
      <input type="text" name="email" placeholder="traveler@realm.io" required />
    </div>
    <div class="field">
      <label>Secret Phrase</label>
      <input type="password" name="password" placeholder="· · · · · · · ·" required />
    </div>
    <button class="btn" type="submit">Begin the Journey</button>
  </form>

  <div class="divider"><span>or</span></div>
  <a href="/admin-login" class="admin-link">Keeper's Sanctum</a>

  <div class="runes">
    <span>◈</span><span>✦</span><span>⬡</span><span>✦</span><span>◈</span>
  </div>
</div>

<script>
// ── ANIMATED CANVAS SCENE ──
const canvas = document.getElementById('scene');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Mountains / terrain layers
const mountains = [
  { color: '#0d1526', points: [0,1,0.15,0.55,0.3,0.7,0.45,0.5,0.6,0.65,0.75,0.45,0.9,0.6,1,1], speed: 0 },
  { color: '#101a2e', points: [0,1,0.1,0.68,0.25,0.55,0.4,0.72,0.55,0.58,0.7,0.68,0.85,0.55,1,1], speed: 0.00005 },
  { color: '#142035', points: [0,1,0.12,0.75,0.28,0.65,0.42,0.78,0.58,0.7,0.72,0.75,0.88,0.65,1,1], speed: 0.0001 },
  { color: '#172840', points: [0,1,0.08,0.82,0.22,0.72,0.38,0.85,0.54,0.75,0.68,0.82,0.84,0.73,1,1], speed: 0.00018 },
];

// Stars
const stars = Array.from({length: 200}, () => ({
  x: Math.random(), y: Math.random() * 0.75,
  r: Math.random() * 1.4 + 0.3,
  opacity: Math.random() * 0.7 + 0.2,
  twinkle: Math.random() * Math.PI * 2,
  speed: Math.random() * 0.02 + 0.005
}));

// Floating orbs (puzzle pieces concept)
const orbs = Array.from({length: 6}, (_, i) => ({
  x: 0.1 + Math.random() * 0.8,
  y: 0.2 + Math.random() * 0.5,
  r: 20 + Math.random() * 30,
  vx: (Math.random() - 0.5) * 0.0002,
  vy: (Math.random() - 0.5) * 0.0001,
  hue: i % 2 === 0 ? '#c8a84b' : '#4ecdc4',
  phase: Math.random() * Math.PI * 2
}));

// Moon
const moon = { x: 0.78, y: 0.18, r: 55 };

let t = 0;

function drawScene() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#020510');
  sky.addColorStop(0.4, '#080e1e');
  sky.addColorStop(0.7, '#0d1528');
  sky.addColorStop(1, '#0a0c14');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Nebula / aurora glow
  const nebula = ctx.createRadialGradient(W*0.3, H*0.25, 0, W*0.3, H*0.25, W*0.5);
  nebula.addColorStop(0, 'rgba(78,205,196,0.04)');
  nebula.addColorStop(0.5, 'rgba(100,80,200,0.025)');
  nebula.addColorStop(1, 'transparent');
  ctx.fillStyle = nebula;
  ctx.fillRect(0, 0, W, H);

  const nebula2 = ctx.createRadialGradient(W*0.7, H*0.15, 0, W*0.7, H*0.15, W*0.4);
  nebula2.addColorStop(0, 'rgba(200,168,75,0.03)');
  nebula2.addColorStop(1, 'transparent');
  ctx.fillStyle = nebula2;
  ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => {
    s.twinkle += s.speed;
    const alpha = s.opacity * (0.7 + 0.3 * Math.sin(s.twinkle));
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,245,220,${alpha})`;
    ctx.fill();
  });

  // Moon glow
  const moonGlow = ctx.createRadialGradient(moon.x*W, moon.y*H, 0, moon.x*W, moon.y*H, moon.r*3.5);
  moonGlow.addColorStop(0, 'rgba(200,168,75,0.12)');
  moonGlow.addColorStop(0.4, 'rgba(200,168,75,0.04)');
  moonGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = moonGlow;
  ctx.fillRect(0, 0, W, H);

  // Moon body
  ctx.beginPath();
  ctx.arc(moon.x*W, moon.y*H, moon.r, 0, Math.PI*2);
  const moonGrad = ctx.createRadialGradient(moon.x*W - moon.r*0.3, moon.y*H - moon.r*0.3, 0, moon.x*W, moon.y*H, moon.r);
  moonGrad.addColorStop(0, '#f0e8c0');
  moonGrad.addColorStop(0.6, '#d4c070');
  moonGrad.addColorStop(1, '#a0883a');
  ctx.fillStyle = moonGrad;
  ctx.fill();

  // Moon crescent shadow
  ctx.beginPath();
  ctx.arc(moon.x*W + moon.r*0.25, moon.y*H - moon.r*0.1, moon.r*0.85, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(5,8,18,0.5)';
  ctx.fill();

  // Floating orbs (geometric puzzle shapes)
  orbs.forEach(o => {
    o.x += o.vx;
    o.y += o.vy;
    o.phase += 0.006;
    if (o.x < 0.05 || o.x > 0.95) o.vx *= -1;
    if (o.y < 0.05 || o.y > 0.85) o.vy *= -1;

    const glow = ctx.createRadialGradient(o.x*W, o.y*H + Math.sin(o.phase)*8, 0, o.x*W, o.y*H, o.r*2.5);
    glow.addColorStop(0, o.hue === '#c8a84b' ? 'rgba(200,168,75,0.09)' : 'rgba(78,205,196,0.07)');
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);

    // Hexagonal shape
    ctx.save();
    ctx.translate(o.x*W, o.y*H + Math.sin(o.phase)*8);
    ctx.rotate(o.phase * 0.3);
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2 - Math.PI/6;
      i === 0 ? ctx.moveTo(Math.cos(a)*o.r, Math.sin(a)*o.r) : ctx.lineTo(Math.cos(a)*o.r, Math.sin(a)*o.r);
    }
    ctx.closePath();
    ctx.strokeStyle = o.hue === '#c8a84b' ? 'rgba(200,168,75,0.25)' : 'rgba(78,205,196,0.2)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  });

  // Mountain layers
  mountains.forEach(m => {
    ctx.beginPath();
    const pts = m.points;
    const offset = (t * m.speed * W) % W;
    ctx.moveTo(-offset, H);
    for (let i = 0; i < pts.length; i += 2) {
      ctx.lineTo(pts[i]*W - offset, pts[i+1]*H);
    }
    ctx.lineTo(W + W - offset, H);
    ctx.closePath();
    ctx.fillStyle = m.color;
    ctx.fill();

    // Second copy for seamless scroll
    if (m.speed > 0) {
      ctx.beginPath();
      ctx.moveTo(W - offset, H);
      for (let i = 0; i < pts.length; i += 2) {
        ctx.lineTo(pts[i]*W + W - offset, pts[i+1]*H);
      }
      ctx.lineTo(W*2 + W - offset, H);
      ctx.closePath();
      ctx.fillStyle = m.color;
      ctx.fill();
    }
  });

  // Foreground mist
  const mist = ctx.createLinearGradient(0, H*0.82, 0, H);
  mist.addColorStop(0, 'transparent');
  mist.addColorStop(1, 'rgba(10,12,20,0.9)');
  ctx.fillStyle = mist;
  ctx.fillRect(0, H*0.82, W, H*0.18);

  t++;
  requestAnimationFrame(drawScene);
}
drawScene();

// ── PARTICLES ──
function spawnParticle() {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = Math.random() * 3 + 1;
  p.style.cssText = `
    width: ${size}px; height: ${size}px;
    left: ${Math.random()*100}vw;
    animation-duration: ${8 + Math.random()*12}s;
    animation-delay: ${Math.random()*4}s;
  `;
  document.getElementById('particles').appendChild(p);
  setTimeout(() => p.remove(), 22000);
}
setInterval(spawnParticle, 600);
</script>
</body>
</html>
