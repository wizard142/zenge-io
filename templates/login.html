<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zenge — Keeper's Sanctum</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--ink:#07080f;--pane:rgba(8,10,18,0.82);--gold:#c8a84b;--gold-glow:rgba(200,168,75,0.45);--crimson:#c0392b;--crimson-dim:rgba(192,57,43,0.1);--text:#e8dfc8;--muted:#5c5542;--border:rgba(200,168,75,0.15);--border-red:rgba(192,57,43,0.25)}
    body{font-family:'Crimson Pro',serif;background:var(--ink);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
    #scene{position:fixed;inset:0;z-index:0}
    .vignette{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse 70% 70% at 50% 50%,transparent 20%,rgba(4,5,12,0.92) 100%)}
    .scan{position:fixed;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent 0%,rgba(192,57,43,0.4) 40%,rgba(192,57,43,0.4) 60%,transparent 100%);animation:scanBeam 8s ease-in-out infinite;z-index:3;pointer-events:none}
    @keyframes scanBeam{0%{top:-2px;opacity:0}5%{opacity:1}95%{opacity:.5}100%{top:100vh;opacity:0}}
    .brand-header{position:fixed;top:32px;left:50%;transform:translateX(-50%);z-index:10;text-align:center}
    .brand-logo{font-family:'Cinzel Decorative',serif;font-size:30px;font-weight:700;color:var(--gold);letter-spacing:0.3em;text-shadow:0 0 30px var(--gold-glow)}
    .brand-eyebrow{font-size:11px;color:var(--muted);letter-spacing:0.4em;text-transform:uppercase;font-family:'Cinzel',serif;margin-top:5px}
    .layout{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;width:440px;animation:emergeUp .9s cubic-bezier(0.16,1,.3,1) .2s both}
    @keyframes emergeUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
    .crest{width:72px;height:72px;position:relative;display:flex;align-items:center;justify-content:center;margin-bottom:-1px;z-index:2;background:var(--ink);border:1px solid var(--border-red);border-bottom:none}
    .crest::before{content:'';position:absolute;inset:4px;border:1px solid rgba(192,57,43,0.15)}
    .crest-icon{font-size:28px;line-height:1}
    .card{width:100%;background:var(--pane);border:1px solid var(--border-red);backdrop-filter:blur(24px);padding:40px 44px 44px;position:relative}
    .card::before,.card::after{content:'✦';position:absolute;font-size:12px;color:var(--crimson);opacity:0.4}
    .card::before{top:10px;left:14px}.card::after{bottom:10px;right:14px}
    h1{font-family:'Cinzel',serif;font-size:20px;font-weight:700;letter-spacing:0.12em;margin-bottom:4px;text-align:center}
    h1 span{color:var(--crimson)}
    .subtitle{font-style:italic;font-size:13px;color:var(--muted);margin-bottom:6px;text-align:center}
    .warning-bar{background:var(--crimson-dim);border:1px solid var(--border-red);padding:9px 16px;margin:18px 0 26px;display:flex;align-items:center;gap:10px;font-size:11px;color:rgba(192,57,43,0.9);font-family:'Cinzel',serif;letter-spacing:0.1em}
    .warning-bar .dot{width:6px;height:6px;flex-shrink:0;background:var(--crimson);border-radius:50%;box-shadow:0 0 8px var(--crimson);animation:wp 1.4s ease-in-out infinite}
    @keyframes wp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.7)}}
    .error{background:rgba(192,57,43,0.12);border:1px solid rgba(192,57,43,0.4);color:#e09090;font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.07em;padding:10px 14px;margin-bottom:18px;text-align:center}
    .field{margin-bottom:18px}
    label{display:block;font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(200,168,75,0.55);margin-bottom:8px}
    input{width:100%;background:rgba(200,168,75,0.03);border:1px solid rgba(200,168,75,0.15);color:var(--text);font-family:'Crimson Pro',serif;font-size:16px;padding:13px 18px;outline:none;transition:border-color .3s,background .3s,box-shadow .3s}
    input::placeholder{color:var(--muted);font-style:italic}
    input:focus{border-color:rgba(192,57,43,0.6);background:var(--crimson-dim);box-shadow:0 0 0 3px rgba(192,57,43,0.08)}
    .btn{width:100%;margin-top:10px;padding:15px;background:linear-gradient(135deg,rgba(139,32,32,0.9),rgba(100,20,20,0.95));color:#f0ddc0;font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;border:1px solid rgba(192,57,43,0.4);cursor:pointer;transition:box-shadow .3s,transform .2s}
    .btn:hover{box-shadow:0 0 24px rgba(192,57,43,0.4),0 4px 16px rgba(0,0,0,.6);transform:translateY(-1px)}
    .footer{text-align:center;margin-top:24px;padding-top:20px;border-top:1px solid rgba(200,168,75,0.08)}
    .footer a{font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .3s}
    .footer a:hover{color:var(--gold)}
    .status-row{display:flex;justify-content:space-between;margin-top:20px;padding:0 2px}
    .si{font-family:'Cinzel',serif;font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:5px}
    .si .ok{width:4px;height:4px;background:#22c55e;border-radius:50%;box-shadow:0 0 4px #22c55e}
  </style>
</head>
<body>
<canvas id="scene"></canvas>
<div class="vignette"></div>
<div class="scan"></div>
<div class="brand-header">
  <div class="brand-logo">ZENGE</div>
  <div class="brand-eyebrow">Keeper's Sanctum</div>
</div>
<div class="layout">
  <div class="crest"><div class="crest-icon">⚔</div></div>
  <div class="card">
    <h1>Warden <span>Access</span></h1>
    <p class="subtitle">Only the Keeper may enter here</p>
    <div class="warning-bar"><span class="dot"></span>Restricted Domain — Authorized Wardens Only</div>
    {% if error %}<div class="error">⚠ {{ error }}</div>{% endif %}
    <form method="post">
      <div class="field">
        <label>Warden's Address</label>
        <input type="text" name="email" placeholder="keeper@zenge.io" required/>
      </div>
      <div class="field">
        <label>Sacred Cipher</label>
        <input type="password" name="password" placeholder="· · · · · · · ·" required/>
      </div>
      <button class="btn" type="submit">⚜ Invoke Access ⚜</button>
    </form>
    <div class="footer"><a href="/">← Return to the World</a></div>
  </div>
  <div class="status-row">
    <div class="si"><span class="ok"></span>Cipher Active</div>
    <div class="si"><span class="ok"></span>Wards Holding</div>
    <div class="si"><span class="ok"></span>Realm Stable</div>
  </div>
</div>
<script>
const canvas=document.getElementById('scene'),ctx=canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight}resize();addEventListener('resize',resize);
const stars=Array.from({length:160},()=>({x:Math.random(),y:Math.random()*.8,r:Math.random()*1.2+0.2,o:Math.random()*.6+.2,t:Math.random()*Math.PI*2,s:Math.random()*.015+.004}));
const runes=Array.from({length:8},()=>({x:Math.random(),y:Math.random()*.9,char:['◈','⬡','✦','⚜','◇','⬟'][Math.floor(Math.random()*6)],size:10+Math.random()*18,phase:Math.random()*Math.PI*2,speed:.003+Math.random()*.004,vx:(Math.random()-.5)*.0001,vy:(Math.random()-.5)*.00005,color:Math.random()>.5?'#c8a84b':'#8b2020'}));
const terrain=[{color:'#090c15',pts:[0,1,0.2,.5,0.4,.65,0.6,.48,0.8,.62,1,1]},{color:'#0c1020',pts:[0,1,0.15,.62,0.35,.72,0.55,.6,0.75,.7,0.92,.62,1,1]},{color:'#0f1428',pts:[0,1,0.1,.74,0.3,.82,0.5,.72,0.7,.78,0.88,.74,1,1]}];
let t=0;
function draw(){
  const W=canvas.width,H=canvas.height;ctx.clearRect(0,0,W,H);
  const sk=ctx.createLinearGradient(0,0,0,H);sk.addColorStop(0,'#03040a');sk.addColorStop(1,'#07080f');ctx.fillStyle=sk;ctx.fillRect(0,0,W,H);
  const bm=ctx.createRadialGradient(W*.22,H*.2,0,W*.22,H*.2,W*.45);bm.addColorStop(0,'rgba(139,32,32,0.06)');bm.addColorStop(1,'transparent');ctx.fillStyle=bm;ctx.fillRect(0,0,W,H);
  stars.forEach(s=>{s.t+=s.s;ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(240,230,210,${s.o*(0.6+0.4*Math.sin(s.t))})`;ctx.fill()});
  const mx=W*.22,my=H*.2,mr=44;
  const mg=ctx.createRadialGradient(mx-mr*.3,my-mr*.2,0,mx,my,mr);mg.addColorStop(0,'#d45050');mg.addColorStop(1,'#5a1010');
  ctx.beginPath();ctx.arc(mx,my,mr,0,Math.PI*2);ctx.fillStyle=mg;ctx.fill();
  ctx.beginPath();ctx.arc(mx+mr*.2,my-mr*.1,mr*.82,0,Math.PI*2);ctx.fillStyle='rgba(4,5,14,0.5)';ctx.fill();
  runes.forEach(r=>{r.phase+=r.speed;r.x+=r.vx;r.y+=r.vy;if(r.x<.02||r.x>.98)r.vx*=-1;if(r.y<.02||r.y>.88)r.vy*=-1;ctx.save();ctx.globalAlpha=0.15+0.08*Math.sin(r.phase);ctx.font=`${r.size}px serif`;ctx.fillStyle=r.color;ctx.fillText(r.char,r.x*W+Math.sin(r.phase)*6,r.y*H+Math.cos(r.phase*.7)*4);ctx.restore()});
  terrain.forEach(m=>{ctx.beginPath();ctx.moveTo(0,H);for(let i=0;i<m.pts.length;i+=2)ctx.lineTo(m.pts[i]*W,m.pts[i+1]*H);ctx.closePath();ctx.fillStyle=m.color;ctx.fill()});
  t++;requestAnimationFrame(draw)}
draw();
</script>
</body>
</html>
