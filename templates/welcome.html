<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zenge — Welcome, Traveler</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--ink:#07080f;--gold:#c8a84b;--gold-glow:rgba(200,168,75,0.5);--teal:#4ecdc4;--text:#e8dfc8;--muted:#5c5542}
    body{font-family:'Crimson Pro',serif;background:var(--ink);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;text-align:center}
    #scene{position:fixed;inset:0;z-index:0}
    .vignette{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse 70% 70% at 50% 50%,transparent 20%,rgba(4,5,12,0.9) 100%)}
    .wrap{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:0;padding:20px}
    .sigil{font-size:56px;animation:sigilIn 1.2s cubic-bezier(0.16,1,0.3,1) both;margin-bottom:8px}
    @keyframes sigilIn{from{opacity:0;transform:scale(0.4) rotate(-20deg)}to{opacity:1;transform:scale(1) rotate(0deg)}}
    .brand{font-family:'Cinzel Decorative',serif;font-size:48px;font-weight:700;letter-spacing:0.2em;color:var(--gold);text-shadow:0 0 50px var(--gold-glow),0 0 100px rgba(200,168,75,0.2);animation:fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.3s both;line-height:1}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .welcome-line{font-family:'Cinzel',serif;font-size:13px;letter-spacing:0.28em;text-transform:uppercase;color:var(--muted);animation:fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.5s both;margin-top:10px}
    .traveler-name{font-family:'Cinzel Decorative',serif;font-size:22px;color:var(--teal);text-shadow:0 0 20px rgba(78,205,196,0.5);animation:fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.7s both;margin:16px 0 6px}
    .divider{display:flex;align-items:center;gap:16px;width:340px;margin:28px auto}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(200,168,75,0.3),transparent)}
    .divider span{font-size:16px;color:var(--gold);opacity:0.5}
    .message{font-style:italic;font-size:17px;color:var(--muted);line-height:1.65;max-width:420px;animation:fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.9s both}
    .enter-btn{margin-top:42px;padding:18px 56px;background:linear-gradient(135deg,rgba(200,168,75,0.92),rgba(175,135,35,0.92));color:#07080f;font-family:'Cinzel',serif;font-size:13px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;border:none;cursor:pointer;text-decoration:none;display:inline-block;animation:fadeUp 1s cubic-bezier(0.16,1,0.3,1) 1.1s both;transition:box-shadow .3s,transform .2s;position:relative;overflow:hidden}
    .enter-btn::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,0.08);opacity:0;transition:opacity .3s}
    .enter-btn:hover{box-shadow:0 0 40px var(--gold-glow),0 8px 24px rgba(0,0,0,0.6);transform:translateY(-2px)}
    .enter-btn:hover::before{opacity:1}
    .logout-link{margin-top:22px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);text-decoration:none;animation:fadeUp 1s cubic-bezier(0.16,1,0.3,1) 1.2s both;transition:color .3s}
    .logout-link:hover{color:rgba(200,168,75,0.6)}
    .particles{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden}
    .particle{position:absolute;width:2px;height:2px;background:var(--gold);border-radius:50%;opacity:0;animation:pFloat linear infinite}
    @keyframes pFloat{0%{transform:translateY(100vh);opacity:0}10%{opacity:0.7}90%{opacity:0.3}100%{transform:translateY(-5vh);opacity:0}}
  </style>
</head>
<body>
<canvas id="scene"></canvas>
<div class="vignette"></div>
<div class="particles" id="particles"></div>
<div class="wrap">
  <div class="sigil">⚜</div>
  <div class="brand">ZENGE</div>
  <div class="welcome-line">Welcome back, Traveler</div>
  <div class="traveler-name">{{ email }}</div>
  <div class="divider"><span>✦</span></div>
  <p class="message">The realm remembers you.<br>Your trials await within the Arcade of Souls.</p>
  <a href="/games" class="enter-btn">Enter the Arcade ✦</a>
  <a href="/logout" class="logout-link">⚔ Not you? Sign out</a>
</div>
<script>
// Particles
function sp(){const p=document.createElement('div');p.className='particle';p.style.cssText=`left:${Math.random()*100}vw;animation-duration:${6+Math.random()*10}s;animation-delay:${Math.random()*3}s;width:${Math.random()*3+1}px;height:${Math.random()*3+1}px`;document.getElementById('particles').appendChild(p);setTimeout(()=>p.remove(),18000)}
setInterval(sp,500);for(let i=0;i<10;i++)sp();

// Background
const canvas=document.getElementById('scene'),ctx=canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight}resize();addEventListener('resize',resize);
const stars=Array.from({length:220},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.4+0.2,o:Math.random()*0.7+0.2,t:Math.random()*Math.PI*2,s:Math.random()*0.012+0.003}));
const mts=[{c:'#0c1220',p:[0,1,0.15,0.55,0.3,0.68,0.5,0.52,0.7,0.64,0.9,0.56,1,1]},{c:'#10192e',p:[0,1,0.12,0.7,0.3,0.78,0.5,0.68,0.7,0.74,0.9,0.7,1,1]},{c:'#141f36',p:[0,1,0.1,0.8,0.3,0.86,0.5,0.78,0.7,0.82,0.9,0.8,1,1]}];
let t=0;
function draw(){
  const W=canvas.width,H=canvas.height;ctx.clearRect(0,0,W,H);
  const sk=ctx.createLinearGradient(0,0,0,H);sk.addColorStop(0,'#020510');sk.addColorStop(1,'#07080f');ctx.fillStyle=sk;ctx.fillRect(0,0,W,H);
  // centre glow
  const cg=ctx.createRadialGradient(W*.5,H*.4,0,W*.5,H*.4,W*.55);cg.addColorStop(0,'rgba(200,168,75,0.06)');cg.addColorStop(1,'transparent');ctx.fillStyle=cg;ctx.fillRect(0,0,W,H);
  stars.forEach(s=>{s.t+=s.s;ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,245,210,${s.o*(0.6+0.4*Math.sin(s.t))})`;ctx.fill()});
  // golden moon centre top
  const mx=W*.5,my=H*.08,mr=38;
  const mg=ctx.createRadialGradient(mx-mr*.3,my-mr*.2,0,mx,my,mr);mg.addColorStop(0,'#f0e8c0');mg.addColorStop(1,'#c0a050');
  const glow=ctx.createRadialGradient(mx,my,0,mx,my,mr*4);glow.addColorStop(0,'rgba(200,168,75,0.18)');glow.addColorStop(1,'transparent');
  ctx.fillStyle=glow;ctx.fillRect(0,0,W,H);
  ctx.beginPath();ctx.arc(mx,my,mr,0,Math.PI*2);ctx.fillStyle=mg;ctx.fill();
  ctx.beginPath();ctx.arc(mx+mr*.25,my-mr*.1,mr*.83,0,Math.PI*2);ctx.fillStyle='rgba(5,8,18,0.4)';ctx.fill();
  mts.forEach(m=>{ctx.beginPath();ctx.moveTo(0,H);for(let i=0;i<m.p.length;i+=2)ctx.lineTo(m.p[i]*W,m.p[i+1]*H);ctx.lineTo(W,H);ctx.closePath();ctx.fillStyle=m.c;ctx.fill()});
  t++;requestAnimationFrame(draw)}
draw();
// Auto-redirect safety net (if user sits idle 5min, nothing happens — they click themselves)
</script>
</body>
</html>
